<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FL Studio Style Music Editor v4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .toolbar {
            background: linear-gradient(180deg, #2a2a2a 0%, #1f1f1f 100%);
            border-bottom: 1px solid #333;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .toolbar-left { display: flex; align-items: center; gap: 8px; }
        .toolbar-center { flex: 1; display: flex; justify-content: center; align-items: center; gap: 16px; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; }

        .btn {
            background: linear-gradient(180deg, #444 0%, #333 100%);
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px 12px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:hover { background: linear-gradient(180deg, #555 0%, #444 100%); border-color: #666; }
        .btn-play { background: linear-gradient(180deg, #4CAF50 0%, #388E3C 100%); border-color: #66BB6A; padding: 8px 16px; font-size: 16px; }
        .btn-play:hover { background: linear-gradient(180deg, #66BB6A 0%, #4CAF50 100%); }
        .btn-stop { background: linear-gradient(180deg, #f44336 0%, #d32f2f 100%); border-color: #ef5350; }
        .btn-stop:hover { background: linear-gradient(180deg, #ef5350 0%, #f44336 100%); }

        .bpm-control { display: flex; align-items: center; gap: 8px; }
        .bpm-control input[type="number"] { width: 60px; background: #2a2a2a; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; color: #e0e0e0; font-size: 14px; text-align: center; }
        .bpm-control input:focus { outline: none; border-color: #666; }
        .bpm-slider { width: 100px; cursor: pointer; }
        .time-display { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; color: #81C784; min-width: 80px; text-align: center; }

        .main-content { flex: 1; display: flex; overflow: hidden; }

        .editor-area { flex: 1; display: flex; flex-direction: column; background: #1f1f1f; border-right: 1px solid #333; }
        .editor-tabs { display: flex; background: #252525; border-bottom: 1px solid #333; }
        .tab-btn { padding: 8px 20px; background: transparent; border: none; color: #888; cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab-btn.active { color: #e0e0e0; border-bottom-color: #4CAF50; background: rgba(76, 175, 80, 0.1); }
        .tab-btn:hover { color: #e0e0e0; }

        .editor-container { flex: 1; overflow: hidden; position: relative; }
        .piano-roll { width: 100%; height: 100%; display: flex; }
        .piano-keyboard { width: 80px; background: #252525; border-right: 1px solid #333; overflow-y: auto; display: flex; flex-direction: column; }
        .piano-key { height: 30px; display: flex; align-items: center; justify-content: flex-end; padding-right: 4px; font-size: 10px; color: #888; border-bottom: 1px solid #333; cursor: pointer; transition: background 0.1s; }
        .piano-key.white { background: #333; }
        .piano-key.black { background: #1a1a1a; color: #aaa; }
        .piano-key.active { background: #4CAF50 !important; color: #fff !important; }
        .piano-key:hover { background: #555; }

        .roll-canvas-wrapper { flex: 1; overflow: auto; position: relative; }
        #rollCanvas { display: block; background: #222; }
        .canvas-cursor { position: absolute; top: 0; left: 0; width: 2px; background: #FF9800; pointer-events: none; z-index: 10; box-shadow: 0 0 6px rgba(255, 152, 0, 0.8); }

        .step-sequencer { width: 100%; height: 100%; overflow: auto; padding: 16px; }
        .sequencer-grid { display: flex; flex-direction: column; gap: 8px; }
        .sequencer-track { display: flex; align-items: center; gap: 12px; padding: 8px; background: #252525; border-radius: 4px; }
        .track-name { width: 80px; font-size: 14px; font-weight: bold; color: #ccc; }
        .track-steps { display: flex; gap: 4px; flex: 1; }
        .step-btn { width: 30px; height: 30px; background: #333; border: 1px solid #444; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
        .step-btn:hover { background: #444; }
        .step-btn.active { background: #4CAF50; border-color: #66BB6A; box-shadow: 0 0 8px rgba(76, 175, 80, 0.5); }
        .step-btn.playing { background: #FF9800; border-color: #FFB74D; }
        .step-btn.active.playing { background: #FFC107; border-color: #FFD54F; box-shadow: 0 0 12px rgba(255, 193, 7, 0.7); }

        .mixer-panel { width: 350px; background: #222; display: flex; flex-direction: column; border-left: 1px solid #333; }
        .mixer-header { padding: 12px 16px; background: #252525; border-bottom: 1px solid #333; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .mixer-toggle { font-size: 20px; cursor: pointer; color: #888; }
        .mixer-content { flex: 1; overflow-y: auto; padding: 12px; }

        .mixer-track { background: #252525; border-radius: 8px; padding: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .mixer-track-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .mixer-track-name { font-size: 13px; font-weight: bold; color: #ccc; }
        .track-controls { display: flex; gap: 4px; }
        .control-btn { width: 24px; height: 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .btn-mute { background: #555; color: #ccc; }
        .btn-mute.active { background: #f44336; color: #fff; }
        .btn-solo { background: #555; color: #ccc; }
        .btn-solo.active { background: #FF9800; color: #fff; }

        .volume-control { margin-bottom: 12px; }
        .volume-label { font-size: 11px; color: #888; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .volume-slider { width: 100%; height: 8px; background: #333; border-radius: 4px; cursor: pointer; appearance: none; }
        .volume-slider::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #4CAF50; border-radius: 50%; cursor: pointer; border: 2px solid #fff; }

        .pan-control { display: flex; flex-direction: column; align-items: center; }
        .pan-label { font-size: 11px; color: #888; margin-bottom: 8px; }
        .pan-knob { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(180deg, #555 0%, #333 100%); border: 2px solid #444; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .pan-knob:hover { border-color: #666; }
        .pan-indicator { width: 4px; height: 16px; background: #4CAF50; border-radius: 2px; transform-origin: center; }

        .master-output { background: #2d2d2d; border-radius: 8px; padding: 12px; margin-top: 12px; border: 1px solid #444; }
        .vu-meters { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
        .vu-meter { width: 24px; height: 80px; background: #1a1a1a; border-radius: 4px; position: relative; overflow: hidden; border: 1px solid #444; }
        .vu-bar { width: 100%; background: linear-gradient(180deg, #4CAF50 0%, #81C784 100%); position: absolute; bottom: 0; transition: height 0.1s; }
        .vu-bar.clip { background: linear-gradient(180deg, #f44336 0%, #ef5350 100%); }

        .snap-selector, .project-controls, .zoom-controls { display: flex; gap: 4px; }
        .snap-btn, .project-btn, .zoom-btn { padding: 4px 8px; font-size: 12px; background: #333; border: 1px solid #444; border-radius: 4px; color: #888; cursor: pointer; transition: all 0.2s; }
        .snap-btn.active { background: #4CAF50; color: #fff; border-color: #66BB6A; }
        .project-btn:hover, .zoom-btn:hover { background: #444; color: #e0e0e0; }

        .loop-toggle { display: flex; align-items: center; gap: 4px; }
        .loop-toggle input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .loop-toggle label { font-size: 14px; color: #ccc; }

        /* 乐器管理面板 */
        .instrument-manager { background: #252525; border-radius: 8px; padding: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .instrument-manager-title { font-size: 12px; font-weight: bold; color: #ccc; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .add-instrument-btn { padding: 4px 8px; font-size: 11px; background: #4CAF50; border: 1px solid #66BB6A; border-radius: 4px; color: #fff; cursor: pointer; }
        .add-instrument-btn:hover { background: #66BB6A; }

        .instrument-list { display: flex; flex-direction: column; gap: 8px; }
        .instrument-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: #333; border-radius: 4px; border: 1px solid #444; cursor: pointer; transition: all 0.2s; }
        .instrument-item:hover { background: #3a3a3a; }
        .instrument-item.active { border-color: #4CAF50; background: rgba(76, 175, 80, 0.1); }
        .instrument-item-color { width: 12px; height: 12px; border-radius: 50%; }
        .instrument-item-name { flex: 1; font-size: 12px; color: #ccc; }
        .instrument-item-type { font-size: 10px; color: #888; }
        .instrument-item-delete { width: 20px; height: 20px; background: transparent; border: none; color: #888; cursor: pointer; font-size: 14px; border-radius: 4px; }
        .instrument-item-delete:hover { background: #f44336; color: #fff; }

        /* 音色编辑面板 */
        .sound-editor { background: #252525; border-radius: 8px; padding: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .sound-editor-title { font-size: 12px; font-weight: bold; color: #ccc; margin-bottom: 8px; }

        .synth-type-selector { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
        .synth-type-btn { padding: 4px 8px; font-size: 11px; background: #333; border: 1px solid #444; border-radius: 4px; color: #888; cursor: pointer; transition: all 0.2s; }
        .synth-type-btn.active { background: #9C27B0; color: #fff; border-color: #BA68C8; }
        .synth-type-btn:hover { background: #444; color: #e0e0e0; }

        .adsr-panel { margin-bottom: 12px; }
        .adsr-title { font-size: 11px; color: #888; margin-bottom: 8px; }
        .adsr-controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .adsr-knob-container { display: flex; flex-direction: column; align-items: center; }
        .adsr-knob { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(180deg, #555 0%, #333 100%); border: 2px solid #444; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
        .adsr-knob:hover { border-color: #666; }
        .adsr-knob-indicator { width: 3px; height: 12px; background: #2196F3; border-radius: 2px; transform-origin: center; }
        .adsr-label { font-size: 10px; color: #888; margin-top: 4px; }
        .adsr-value { font-size: 10px; color: #4CAF50; }

        .filter-panel { margin-bottom: 12px; }
        .filter-title { font-size: 11px; color: #888; margin-bottom: 8px; }
        .filter-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .filter-type-select { background: #333; border: 1px solid #444; border-radius: 4px; padding: 4px 8px; color: #e0e0e0; font-size: 12px; cursor: pointer; }
        .filter-freq { flex: 1; min-width: 100px; }

        .section-divider { height: 1px; background: #333; margin: 12px 0; }
        .section-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }

        /* 模态框 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #2a2a2a; border-radius: 8px; padding: 20px; min-width: 400px; max-width: 600px; border: 1px solid #444; }
        .modal-header { font-size: 16px; font-weight: bold; margin-bottom: 16px; color: #fff; }
        .modal-content { margin-bottom: 16px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; }
        .modal-btn { padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; border: none; }
        .modal-btn-cancel { background: #555; color: #ccc; }
        .modal-btn-cancel:hover { background: #666; }
        .modal-btn-confirm { background: #4CAF50; color: #fff; }
        .modal-btn-confirm:hover { background: #66BB6A; }

        .form-group { margin-bottom: 12px; }
        .form-label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
        .form-input { width: 100%; padding: 8px; background: #333; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; font-size: 14px; }
        .form-input:focus { outline: none; border-color: #666; }
        .form-select { width: 100%; padding: 8px; background: #333; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; font-size: 14px; cursor: pointer; }

        /* 轨道乐器选择 */
        .track-instrument-select { background: #333; border: 1px solid #444; border-radius: 4px; padding: 4px; color: #e0e0e0; font-size: 11px; cursor: pointer; width: 100%; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <div class="toolbar-left">
            <div class="project-controls">
                <button class="project-btn" onclick="app.newProject()">新建</button>
                <button class="project-btn" onclick="app.saveProject()">保存</button>
                <button class="project-btn" onclick="app.loadProject()">加载</button>
                <button class="project-btn" onclick="app.exportAudio()">导出WAV</button>
            </div>
        </div>
        
        <div class="toolbar-center">
            <button class="btn btn-stop" onclick="app.stop()">■</button>
            <button class="btn btn-play" onclick="app.play()">▶</button>
            <div class="time-display" id="timeDisplay">1:1:00</div>
            <div class="bpm-control">
                <span style="font-size: 14px; color: #888;">BPM</span>
                <input type="number" id="bpmInput" value="120" min="60" max="200" onchange="app.setBPM(this.value)">
                <input type="range" class="bpm-slider" id="bpmSlider" value="120" min="60" max="200" oninput="app.setBPM(this.value)">
            </div>
            <div class="loop-toggle">
                <input type="checkbox" id="loopToggle" checked onchange="app.setLoop(this.checked)">
                <label for="loopToggle">循环</label>
            </div>
        </div>
        
        <div class="toolbar-right">
            <div class="snap-selector">
                <button class="snap-btn active" data-snap="4" onclick="app.setSnap(4)">1/4</button>
                <button class="snap-btn" data-snap="8" onclick="app.setSnap(8)">1/8</button>
                <button class="snap-btn" data-snap="16" onclick="app.setSnap(16)">1/16</button>
            </div>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="app.zoomIn()">+</button>
                <button class="zoom-btn" onclick="app.zoomOut()">-</button>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="editor-area">
            <div class="editor-tabs">
                <button class="tab-btn active" onclick="app.switchView('piano')">钢琴卷帘</button>
                <button class="tab-btn" onclick="app.switchView('step')">步进音序器</button>
            </div>
            <div class="editor-container">
                <div id="pianoRollView" class="piano-roll">
                    <div class="piano-keyboard" id="pianoKeyboard"></div>
                    <div class="roll-canvas-wrapper">
                        <canvas id="rollCanvas"></canvas>
                        <div class="canvas-cursor" id="playCursor"></div>
                    </div>
                </div>
                <div id="stepSequencerView" class="step-sequencer" style="display: none;">
                    <div class="sequencer-grid" id="sequencerGrid"></div>
                </div>
            </div>
        </div>
        
        <div class="mixer-panel">
            <div class="mixer-header">
                <span>乐器 & 混音</span>
                <span class="mixer-toggle" onclick="app.toggleMixer()">◀</span>
            </div>
            <div class="mixer-content" id="mixerContent"></div>
        </div>
    </div>

    <script>
        // ========== 音频引擎 v3 ==========
        class AudioEngine {
            constructor() {
                this.audioContext = null;
                this.masterGain = null;
                this.masterCompressor = null;
                this.isInitialized = false;
                this.scheduledNotes = [];
                
                // 自定义乐器列表
                this.instruments = {};
                this.instrumentCounter = 0;
                
                // 初始化默认乐器
                this.initDefaultInstruments();
            }

            initDefaultInstruments() {
                // 钢琴 - FM合成
                this.addInstrument({
                    name: '钢琴',
                    type: 'fm',
                    attack: 0.005,
                    decay: 0.3,
                    sustain: 0.4,
                    release: 0.5,
                    filterType: 'lowpass',
                    filterFreq: 5000,
                    filterQ: 1,
                    modulatorFreq: 1.5,
                    modulatorGain: 200,
                    color: '#4CAF50'
                });

                // 风琴 - 加法合成
                this.addInstrument({
                    name: '风琴',
                    type: 'additive',
                    attack: 0.01,
                    decay: 0.1,
                    sustain: 0.8,
                    release: 0.3,
                    filterType: 'lowpass',
                    filterFreq: 4000,
                    filterQ: 0.5,
                    harmonics: [1, 2, 3, 4, 5, 6],
                    amplitudes: [1, 0.5, 0.3, 0.25, 0.2, 0.15],
                    color: '#9C27B0'
                });

                // 合成器 - 减法合成
                this.addInstrument({
                    name: '合成器',
                    type: 'subtractive',
                    waveform: 'sawtooth',
                    attack: 0.05,
                    decay: 0.2,
                    sustain: 0.6,
                    release: 0.4,
                    filterType: 'lowpass',
                    filterFreq: 2000,
                    filterQ: 5,
                    detune: 5,
                    color: '#2196F3'
                });

                // 铺底
                this.addInstrument({
                    name: '铺底',
                    type: 'pad',
                    attack: 0.5,
                    decay: 0.5,
                    sustain: 0.7,
                    release: 1.0,
                    filterType: 'lowpass',
                    filterFreq: 3000,
                    filterQ: 2,
                    detunes: [-12, -5, 0, 5, 12],
                    color: '#FF9800'
                });

                // 贝斯
                this.addInstrument({
                    name: '贝斯',
                    type: 'subtractive',
                    waveform: 'sawtooth',
                    attack: 0.01,
                    decay: 0.2,
                    sustain: 0.5,
                    release: 0.2,
                    filterType: 'lowpass',
                    filterFreq: 800,
                    filterQ: 3,
                    color: '#F44336'
                });
            }

            addInstrument(config) {
                const id = 'inst_' + (++this.instrumentCounter);
                this.instruments[id] = {
                    id: id,
                    name: config.name || '新乐器',
                    type: config.type || 'subtractive',
                    attack: config.attack || 0.01,
                    decay: config.decay || 0.2,
                    sustain: config.sustain || 0.5,
                    release: config.release || 0.3,
                    filterType: config.filterType || 'lowpass',
                    filterFreq: config.filterFreq || 2000,
                    filterQ: config.filterQ || 1,
                    waveform: config.waveform || 'sawtooth',
                    modulatorFreq: config.modulatorFreq || 1.5,
                    modulatorGain: config.modulatorGain || 200,
                    harmonics: config.harmonics || [1, 2, 3, 4, 5],
                    amplitudes: config.amplitudes || [1, 0.5, 0.3, 0.2, 0.1],
                    detune: config.detune || 0,
                    detunes: config.detunes || [0],
                    color: config.color || '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')
                };
                return id;
            }

            removeInstrument(id) {
                if (this.instruments[id] && Object.keys(this.instruments).length > 1) {
                    delete this.instruments[id];
                    return true;
                }
                return false;
            }

            getInstrument(id) {
                return this.instruments[id] || Object.values(this.instruments)[0];
            }

            getInstrumentList() {
                return Object.values(this.instruments);
            }

            init() {
                if (this.isInitialized) return;
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                this.masterCompressor = this.audioContext.createDynamicsCompressor();
                this.masterCompressor.threshold.value = -24;
                this.masterCompressor.knee.value = 30;
                this.masterCompressor.ratio.value = 12;
                this.masterCompressor.attack.value = 0.003;
                this.masterCompressor.release.value = 0.25;
                
                this.masterGain = this.audioContext.createGain();
                this.masterGain.gain.value = 0.8;
                
                this.masterGain.connect(this.masterCompressor);
                this.masterCompressor.connect(this.audioContext.destination);
                
                this.isInitialized = true;
            }

            playNote(freq, startTime, duration, trackSettings, instrumentId) {
                if (!this.isInitialized) return;
                
                const inst = this.getInstrument(instrumentId);
                if (!inst) return;

                switch (inst.type) {
                    case 'fm':
                        this.playFMNote(freq, startTime, duration, trackSettings, inst);
                        break;
                    case 'additive':
                        this.playAdditiveNote(freq, startTime, duration, trackSettings, inst);
                        break;
                    case 'subtractive':
                        this.playSubtractiveNote(freq, startTime, duration, trackSettings, inst);
                        break;
                    case 'pad':
                        this.playPadNote(freq, startTime, duration, trackSettings, inst);
                        break;
                    default:
                        this.playBasicNote(freq, startTime, duration, trackSettings, inst);
                }
            }

            playFMNote(freq, startTime, duration, trackSettings, inst) {
                const ctx = this.audioContext;
                
                const carrier = ctx.createOscillator();
                carrier.type = 'sine';
                carrier.frequency.value = freq;
                
                const modulator = ctx.createOscillator();
                modulator.type = 'sine';
                modulator.frequency.value = freq * inst.modulatorFreq;
                
                const modGain = ctx.createGain();
                modGain.gain.value = inst.modulatorGain;
                
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, startTime);
                envelope.gain.linearRampToValueAtTime(trackSettings.volume * 0.6, startTime + inst.attack);
                envelope.gain.linearRampToValueAtTime(trackSettings.volume * 0.6 * inst.sustain, startTime + inst.attack + inst.decay);
                envelope.gain.setValueAtTime(trackSettings.volume * 0.6 * inst.sustain, startTime + duration - inst.release);
                envelope.gain.linearRampToValueAtTime(0, startTime + duration);
                
                const filter = ctx.createBiquadFilter();
                filter.type = inst.filterType;
                filter.frequency.value = inst.filterFreq;
                filter.Q.value = inst.filterQ;
                
                const panner = ctx.createStereoPanner();
                panner.pan.value = trackSettings.pan;
                
                modulator.connect(modGain);
                modGain.connect(carrier.frequency);
                carrier.connect(envelope);
                envelope.connect(filter);
                filter.connect(panner);
                panner.connect(this.masterGain);
                
                carrier.start(startTime);
                modulator.start(startTime);
                carrier.stop(startTime + duration + 0.1);
                modulator.stop(startTime + duration + 0.1);
                
                this.scheduledNotes.push({ carrier, modulator, startTime, endTime: startTime + duration });
            }

            playAdditiveNote(freq, startTime, duration, trackSettings, inst) {
                const ctx = this.audioContext;
                const oscillators = [];
                
                const masterEnv = ctx.createGain();
                masterEnv.gain.setValueAtTime(0, startTime);
                masterEnv.gain.linearRampToValueAtTime(trackSettings.volume * 0.5, startTime + inst.attack);
                masterEnv.gain.linearRampToValueAtTime(trackSettings.volume * 0.5 * inst.sustain, startTime + inst.attack + inst.decay);
                masterEnv.gain.setValueAtTime(trackSettings.volume * 0.5 * inst.sustain, startTime + duration - inst.release);
                masterEnv.gain.linearRampToValueAtTime(0, startTime + duration);
                
                const filter = ctx.createBiquadFilter();
                filter.type = inst.filterType;
                filter.frequency.value = inst.filterFreq;
                filter.Q.value = inst.filterQ;
                
                const panner = ctx.createStereoPanner();
                panner.pan.value = trackSettings.pan;
                
                for (let i = 0; i < inst.harmonics.length; i++) {
                    const osc = ctx.createOscillator();
                    osc.type = 'sine';
                    osc.frequency.value = freq * inst.harmonics[i];
                    
                    const gain = ctx.createGain();
                    gain.gain.value = inst.amplitudes[i] * 0.2;
                    
                    osc.connect(gain);
                    gain.connect(masterEnv);
                    osc.start(startTime);
                    osc.stop(startTime + duration + 0.1);
                    oscillators.push(osc);
                }
                
                masterEnv.connect(filter);
                filter.connect(panner);
                panner.connect(this.masterGain);
                
                this.scheduledNotes.push({ oscillators, startTime, endTime: startTime + duration });
            }

            playSubtractiveNote(freq, startTime, duration, trackSettings, inst) {
                const ctx = this.audioContext;
                
                const osc = ctx.createOscillator();
                osc.type = inst.waveform || 'sawtooth';
                osc.frequency.value = freq;
                
                const osc2 = ctx.createOscillator();
                osc2.type = inst.waveform || 'sawtooth';
                osc2.frequency.value = freq * (1 + (inst.detune || 0) / 1000);
                
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, startTime);
                envelope.gain.linearRampToValueAtTime(trackSettings.volume * 0.5, startTime + inst.attack);
                envelope.gain.linearRampToValueAtTime(trackSettings.volume * 0.5 * inst.sustain, startTime + inst.attack + inst.decay);
                envelope.gain.setValueAtTime(trackSettings.volume * 0.5 * inst.sustain, startTime + duration - inst.release);
                envelope.gain.linearRampToValueAtTime(0, startTime + duration);
                
                const filter = ctx.createBiquadFilter();
                filter.type = inst.filterType;
                filter.frequency.setValueAtTime(inst.filterFreq * 3, startTime);
                filter.frequency.exponentialRampToValueAtTime(inst.filterFreq, startTime + inst.attack + inst.decay);
                filter.Q.value = inst.filterQ;
                
                const panner = ctx.createStereoPanner();
                panner.pan.value = trackSettings.pan;
                
                osc.connect(envelope);
                osc2.connect(envelope);
                envelope.connect(filter);
                filter.connect(panner);
                panner.connect(this.masterGain);
                
                osc.start(startTime);
                osc2.start(startTime);
                osc.stop(startTime + duration + 0.1);
                osc2.stop(startTime + duration + 0.1);
                
                this.scheduledNotes.push({ osc, osc2, startTime, endTime: startTime + duration });
            }

            playPadNote(freq, startTime, duration, trackSettings, inst) {
                const ctx = this.audioContext;
                const oscillators = [];
                
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, startTime);
                envelope.gain.linearRampToValueAtTime(trackSettings.volume * 0.3, startTime + inst.attack);
                envelope.gain.linearRampToValueAtTime(trackSettings.volume * 0.3 * inst.sustain, startTime + inst.attack + inst.decay);
                envelope.gain.setValueAtTime(trackSettings.volume * 0.3 * inst.sustain, startTime + duration - inst.release);
                envelope.gain.linearRampToValueAtTime(0, startTime + duration);
                
                const filter = ctx.createBiquadFilter();
                filter.type = inst.filterType;
                filter.frequency.value = inst.filterFreq;
                filter.Q.value = inst.filterQ;
                
                const panner = ctx.createStereoPanner();
                panner.pan.value = trackSettings.pan;
                
                for (const detune of (inst.detunes || [0])) {
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth';
                    osc.frequency.value = freq;
                    osc.detune.value = detune;
                    osc.connect(envelope);
                    osc.start(startTime);
                    osc.stop(startTime + duration + 0.1);
                    oscillators.push(osc);
                }
                
                envelope.connect(filter);
                filter.connect(panner);
                panner.connect(this.masterGain);
                
                this.scheduledNotes.push({ oscillators, startTime, endTime: startTime + duration });
            }

            playBasicNote(freq, startTime, duration, trackSettings, inst) {
                const ctx = this.audioContext;
                
                const osc = ctx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                
                const envelope = ctx.createGain();
                envelope.gain.setValueAtTime(0, startTime);
                envelope.gain.linearRampToValueAtTime(trackSettings.volume * 0.5, startTime + inst.attack);
                envelope.gain.linearRampToValueAtTime(trackSettings.volume * 0.5 * inst.sustain, startTime + inst.attack + inst.decay);
                envelope.gain.setValueAtTime(trackSettings.volume * 0.5 * inst.sustain, startTime + duration - inst.release);
                envelope.gain.linearRampToValueAtTime(0, startTime + duration);
                
                const filter = ctx.createBiquadFilter();
                filter.type = inst.filterType;
                filter.frequency.value = inst.filterFreq;
                filter.Q.value = inst.filterQ;
                
                const panner = ctx.createStereoPanner();
                panner.pan.value = trackSettings.pan;
                
                osc.connect(envelope);
                envelope.connect(filter);
                filter.connect(panner);
                panner.connect(this.masterGain);
                
                osc.start(startTime);
                osc.stop(startTime + duration + 0.1);
                
                this.scheduledNotes.push({ osc, startTime, endTime: startTime + duration });
            }

            stopAll() {
                for (const note of this.scheduledNotes) {
                    try {
                        if (note.osc) note.osc.stop();
                        if (note.osc2) note.osc2.stop();
                        if (note.carrier) note.carrier.stop();
                        if (note.modulator) note.modulator.stop();
                        if (note.source) note.source.stop();
                        if (note.oscillators) {
                            for (const osc of note.oscillators) {
                                try { osc.stop(); } catch (e) {}
                            }
                        }
                    } catch (e) {}
                }
                this.scheduledNotes = [];
            }

            getCurrentTime() {
                return this.audioContext ? this.audioContext.currentTime : 0;
            }

            resume() {
                if (this.audioContext && this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
            }
        }

        // ========== 音序器 ==========
        class Sequencer {
            constructor(audioEngine, ui) {
                this.audioEngine = audioEngine;
                this.ui = ui;
                this.isPlaying = false;
                this.currentStep = 0;
                this.bpm = 120;
                this.loop = true;
                this.scheduleAheadTime = 0.1;
                this.lookahead = 25;
                this.nextNoteTime = 0;
                this.timerID = null;
                this.totalSteps = 64;
                this.onStepChange = null;
            }

            setBPM(bpm) { this.bpm = parseInt(bpm); }
            setLoop(loop) { this.loop = loop; }
            getStepDuration() { return 60 / (this.bpm * 4); }

            start() {
                if (this.isPlaying) return;
                this.audioEngine.init();
                this.audioEngine.resume();
                this.isPlaying = true;
                this.nextNoteTime = this.audioEngine.getCurrentTime() + 0.05;
                this.currentStep = 0;
                this.scheduler();
            }

            stop() {
                this.isPlaying = false;
                if (this.timerID) {
                    clearTimeout(this.timerID);
                    this.timerID = null;
                }
                this.audioEngine.stopAll();
                this.currentStep = 0;
                if (this.onStepChange) this.onStepChange(0);
            }

            scheduler() {
                while (this.nextNoteTime < this.audioEngine.getCurrentTime() + this.scheduleAheadTime) {
                    this.scheduleNote(this.currentStep, this.nextNoteTime);
                    this.nextStep();
                }
                if (this.isPlaying) {
                    this.timerID = setTimeout(() => this.scheduler(), this.lookahead);
                }
            }

            scheduleNote(step, time) {
                const tracks = this.ui.tracks;
                
                for (const trackId in tracks) {
                    const track = tracks[trackId];
                    if (track.mute) continue;
                    
                    const hasSolo = Object.values(tracks).some(t => t.solo);
                    if (hasSolo && !track.solo) continue;

                    if (track.type === 'step' && track.steps[step % 16]) {
                        this.audioEngine.playDrum(track.instrument, time, {
                            volume: track.volume,
                            pan: track.pan
                        });
                    }
                }

                const notes = this.ui.notes;
                for (const note of notes) {
                    if (note.startStep === step) {
                        const track = tracks[note.trackId];
                        if (!track || track.mute) continue;
                        
                        const hasSolo = Object.values(tracks).some(t => t.solo);
                        if (hasSolo && !track.solo) continue;

                        const freq = 440 * Math.pow(2, (note.pitch - 69) / 12);
                        const duration = note.durationSteps * this.getStepDuration();
                        this.audioEngine.playNote(freq, time, duration, {
                            volume: track.volume,
                            pan: track.pan
                        }, note.instrumentId);
                    }
                }

                if (this.onStepChange) this.onStepChange(step);
            }

            nextStep() {
                const secondsPerStep = this.getStepDuration();
                this.nextNoteTime += secondsPerStep;
                this.currentStep++;
                
                if (this.loop && this.currentStep >= this.totalSteps) {
                    this.currentStep = 0;
                    this.nextNoteTime = this.audioEngine.getCurrentTime() + 0.05;
                }
            }
        }

            initPianoKeyboard() {
                this.pianoKeyboard.innerHTML = '';
                const startNote = 48;
                const endNote = 84;
                
                for (let i = endNote; i >= startNote; i--) {
                    const key = document.createElement('div');
                    const noteName = this.getNoteName(i);
                    key.className = `piano-key ${this.isBlackKey(i) ? 'black' : 'white'}`;
                    key.textContent = noteName;
                    key.dataset.note = i;
                    this.pianoKeyboard.appendChild(key);
                }
            }

            getNoteName(midi) {
                const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                const octave = Math.floor(midi / 12) - 1;
                return notes[midi % 12] + octave;
            }

            isBlackKey(midi) {
                const blackKeys = [1, 3, 6, 8, 10];
                return blackKeys.includes(midi % 12);
            }

            initCanvas() {
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                this.drawPianoRoll();
            }

            resizeCanvas() {
                const wrapper = this.canvas.parentElement;
                this.canvas.width = wrapper.clientWidth;
                this.canvas.height = wrapper.clientHeight;
                this.drawPianoRoll();
            }

            drawPianoRoll() {
                const ctx = this.ctx;
                const width = this.canvas.width;
                const height = this.canvas.height;
                const startNote = 48;
                const endNote = 84;
                const noteCount = endNote - startNote + 1;
                const noteHeight = height / noteCount;

                ctx.fillStyle = '#222';
                ctx.fillRect(0, 0, width, height);

                for (let step = 0; step < 64; step++) {
                    const x = step * this.zoom;
                    if (step % 16 === 0) {
                        ctx.strokeStyle = '#555';
                        ctx.lineWidth = 2;
                    } else if (step % 4 === 0) {
                        ctx.strokeStyle = '#444';
                        ctx.lineWidth = 1;
                    } else {
                        ctx.strokeStyle = '#333';
                        ctx.lineWidth = 0.5;
                    }
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, height);
                    ctx.stroke();
                }

                for (let i = 0; i <= noteCount; i++) {
                    const y = i * noteHeight;
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(width, y);
                    ctx.stroke();
                }

                for (const note of this.notes) {
                    const inst = this.app.audioEngine.getInstrument(note.instrumentId);
                    const color = inst ? inst.color : '#4CAF50';
                    
                    const noteY = (endNote - note.pitch) * noteHeight;
                    const noteX = note.startStep * this.zoom;
                    const noteWidth = note.durationSteps * this.zoom;

                    ctx.fillStyle = color;
                    ctx.fillRect(noteX, noteY, noteWidth, noteHeight - 1);

                    ctx.fillStyle = this.lightenColor(color, 30);
                    ctx.fillRect(noteX, noteY, noteWidth, 3);

                    ctx.fillStyle = '#fff';
                    ctx.font = '10px Arial';
                    ctx.fillText(this.getNoteName(note.pitch), noteX + 2, noteY + 12);
                }
            }

            lightenColor(color, percent) {
                const num = parseInt(color.replace('#', ''), 16);
                const amt = Math.round(2.55 * percent);
                const R = Math.min(255, (num >> 16) + amt);
                const G = Math.min(255, (num >> 8 & 0x00FF) + amt);
                const B = Math.min(255, (num & 0x0000FF) + amt);
                return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
            }

                            <div class="filter-freq">
                                <div class="volume-label"><span>频率</span><span>${inst.filterFreq}Hz</span></div>
                                <input type="range" class="volume-slider" min="100" max="10000" value="${inst.filterFreq}" oninput="app.setInstrumentFilter('${inst.id}', 'filterFreq', this.value)">
                            </div>
                        </div>
                    </div>
                `;
                
                // 插入到乐器列表后面
                const list = document.getElementById('instrumentList');
                if (list) {
                    list.parentNode.insertBefore(editor, list.nextSibling);
                }
            }

            initSequencerUI() {
                this.sequencerGrid.innerHTML = '';
                
                for (const trackId in this.tracks) {
                    const track = this.tracks[trackId];
                    if (track.type !== 'step') continue;

                    const trackEl = document.createElement('div');
                    trackEl.className = 'sequencer-track';
                    
                    const nameEl = document.createElement('div');
                    nameEl.className = 'track-name';
                    nameEl.textContent = track.name;
                    trackEl.appendChild(nameEl);

                    const stepsEl = document.createElement('div');
                    stepsEl.className = 'track-steps';
                    
                    for (let i = 0; i < 16; i++) {
                        const stepBtn = document.createElement('button');
                        stepBtn.className = `step-btn ${track.steps[i] ? 'active' : ''}`;
                        stepBtn.dataset.track = trackId;
                        stepBtn.dataset.step = i;
                        stepBtn.onclick = () => this.toggleStep(trackId, i);
                        stepsEl.appendChild(stepBtn);
                    }
                    trackEl.appendChild(stepsEl);
                    this.sequencerGrid.appendChild(trackEl);
                }
            }

            toggleStep(trackId, stepIndex) {
                this.tracks[trackId].steps[stepIndex] = !this.tracks[trackId].steps[stepIndex];
                this.initSequencerUI();
            }

            bindEvents() {
                let isDragging = false;
                let isResizing = false;
                let dragNote = null;
                let startX, startY;
                let startStep, startPitch;
                let startDuration;

                this.canvas.addEventListener('mousedown', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const clickedNote = this.findNoteAt(x, y);
                    
                    if (clickedNote) {
                        const noteX = clickedNote.startStep * this.zoom;
                        const noteWidth = clickedNote.durationSteps * this.zoom;
                        
                        if (x - noteX < 8 || noteX + noteWidth - x < 8) {
                            isResizing = true;
                            dragNote = clickedNote;
                            startX = x;
                            startDuration = clickedNote.durationSteps;
                        } else {
                            isDragging = true;
                            dragNote = clickedNote;
                            startX = x;
                            startY = y;
                            startStep = clickedNote.startStep;
                            startPitch = clickedNote.pitch;
                        }
                    } else {
                        const step = Math.floor(x / this.zoom);
                        const noteCount = 37;
                        const pitch = 84 - Math.floor(y / (this.canvas.height / noteCount));
                        
                        if (pitch >= 48 && pitch <= 84 && step >= 0 && step < 64) {
                            const snappedStep = this.snapStep(step);
                            const instruments = this.app.audioEngine.getInstrumentList();
                            const defaultInstId = instruments.length > 0 ? instruments[0].id : null;
                            
                            const newNote = {
                                pitch: pitch,
                                startStep: snappedStep,
                                durationSteps: this.snap === 16 ? 4 : this.snap === 8 ? 2 : 1,
                                trackId: 'piano',
                                instrumentId: this.selectedInstrumentId || defaultInstId
                            };
                            this.notes.push(newNote);
                            this.drawPianoRoll();
                        }
                    }
                });

                this.canvas.addEventListener('mousemove', (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    if (isDragging && dragNote) {
                        const deltaStep = Math.round((x - startX) / this.zoom);
                        const noteCount = 37;
                        const deltaPitch = Math.round((startY - y) / (this.canvas.height / noteCount));
                        
                        dragNote.startStep = Math.max(0, Math.min(63, this.snapStep(startStep + deltaStep)));
                        dragNote.pitch = Math.max(48, Math.min(84, startPitch + deltaPitch));
                        this.drawPianoRoll();
                    } else if (isResizing && dragNote) {
                        const deltaStep = Math.round((x - startX) / this.zoom);
                        dragNote.durationSteps = Math.max(1, startDuration + deltaStep);
                        this.drawPianoRoll();
                    }
                });

                this.canvas.addEventListener('mouseup', () => {
                    isDragging = false;
                    isResizing = false;
                    dragNote = null;
                });

                this.canvas.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const rect = this.canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    const clickedNote = this.findNoteAt(x, y);
                    if (clickedNote) {
                        this.notes = this.notes.filter(n => n !== clickedNote);
                        this.drawPianoRoll();
                    }
                });
            }

            findNoteAt(x, y) {
                const noteCount = 37;
                const step = Math.floor(x / this.zoom);
                const pitch = 84 - Math.floor(y / (this.canvas.height / noteCount));
                
                return this.notes.find(n => 
                    n.startStep <= step && 
                    n.startStep + n.durationSteps > step &&
                    n.pitch === pitch
                );
            }

            snapStep(step) {
                const snapValue = 64 / this.snap;
                return Math.round(step / snapValue) * snapValue;
            }

            updatePlayPosition(step) {
                const x = step * this.zoom;
                this.playCursor.style.left = x + 'px';
                this.playCursor.style.height = this.canvas.height + 'px';
                
                const bars = Math.floor(step / 16) + 1;
                const beats = Math.floor((step % 16) / 4) + 1;
                const subBeats = step % 4;
                this.timeDisplay.textContent = `${bars}:${beats}:${subBeats.toString().padStart(2, '0')}`;

                for (const btn of document.querySelectorAll('.step-btn')) {
                    btn.classList.remove('playing');
                }
                const currentStep = step % 16;
                document.querySelectorAll(`.step-btn[data-step="${currentStep}"]`).forEach(btn => {
                    btn.classList.add('playing');
                });

                document.querySelectorAll('.piano-key').forEach(key => {
                    key.classList.remove('active');
                });
                for (const note of this.notes) {
                    if (note.startStep <= step && note.startStep + note.durationSteps > step) {
                        const key = document.querySelector(`.piano-key[data-note="${note.pitch}"]`);
                        if (key) key.classList.add('active');
                    }
                }
            }

            switchView(view) {
                this.currentView = view;
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
                
                document.getElementById('pianoRollView').style.display = view === 'piano' ? 'flex' : 'none';
                document.getElementById('stepSequencerView').style.display = view === 'step' ? 'block' : 'none';
            }

            zoomIn() {
                this.zoom = Math.min(100, this.zoom + 10);
                this.drawPianoRoll();
            }

            zoomOut() {
                this.zoom = Math.max(20, this.zoom - 10);
                this.drawPianoRoll();
            }

            setSnap(snap) {
                this.snap = snap;
                document.querySelectorAll('.snap-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelector(`.snap-btn[data-snap="${snap}"]`).classList.add('active');
            }
        }

        // ========== 应用主类 ==========
        class App {
            constructor() {
                this.audioEngine = new AudioEngine();
                this.ui = new UI(this);
                this.sequencer = new Sequencer(this.audioEngine, this.ui);
                this.sequencer.onStepChange = (step) => this.ui.updatePlayPosition(step);
            }

            play() { this.sequencer.start(); }
            stop() { this.sequencer.stop(); this.ui.updatePlayPosition(0); }

            setBPM(bpm) {
                this.sequencer.setBPM(bpm);
                document.getElementById('bpmInput').value = bpm;
                document.getElementById('bpmSlider').value = bpm;
            }

            setLoop(loop) { this.sequencer.setLoop(loop); }
            setSnap(snap) { this.ui.setSnap(snap); }

            showAddInstrumentModal() {
                const modal = document.createElement('div');
                modal.className = 'modal-overlay';
                modal.id = 'addInstrumentModal';
                modal.innerHTML = `
                    <div class="modal">
                        <div class="modal-header">添加新乐器</div>
                        <div class="modal-content">
                            <div class="form-group">
                                <label class="form-label">乐器名称</label>
                                <input type="text" class="form-input" id="newInstName" placeholder="输入乐器名称">
                            </div>
                            <div class="form-group">
                                <label class="form-label">合成类型</label>
                                <select class="form-select" id="newInstType">
                                    <option value="fm">FM 合成</option>
                                    <option value="additive">加法合成</option>
                                    <option value="subtractive">减法合成</option>
                                    <option value="pad">铺底音色</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="modal-btn modal-btn-cancel" onclick="app.closeModal()">取消</button>
                            <button class="modal-btn modal-btn-confirm" onclick="app.createInstrument()">创建</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            }

            closeModal() {
                const modal = document.getElementById('addInstrumentModal');
                if (modal) modal.remove();
            }

            createInstrument() {
                const name = document.getElementById('newInstName').value || '新乐器';
                const type = document.getElementById('newInstType').value;
                
                const id = this.audioEngine.addInstrument({
                    name: name,
                    type: type
                });
                
                this.closeModal();
                this.ui.initMixer();
                this.ui.selectInstrument(id);
            }

            deleteInstrument(id) {
                if (this.audioEngine.removeInstrument(id)) {
                    if (this.ui.selectedInstrumentId === id) {
                        this.ui.selectedInstrumentId = null;
                    }
                    this.ui.initMixer();
                } else {
                    alert('无法删除：至少需要保留一个乐器');
                }
            }

            selectInstrument(id) {
                this.ui.selectInstrument(id);
            }

            setInstrumentType(id, type) {
                const inst = this.audioEngine.getInstrument(id);
                if (inst) {
                    inst.type = type;
                    this.ui.renderSoundEditor();
                }
            }

            setInstrumentFilter(id, param, value) {
                const inst = this.audioEngine.getInstrument(id);
                if (inst) {
                    if (param === 'filterFreq') {
                        inst.filterFreq = parseInt(value);
                    } else {
                        inst[param] = value;
                    }
                    this.ui.renderSoundEditor();
                }
            }

            startADSRDrag(e, instId, param) {
                e.preventDefault();
                const inst = this.audioEngine.getInstrument(instId);
                if (!inst) return;
                
                const knob = e.target.closest('.adsr-knob');
                const rect = knob.getBoundingClientRect();
                const startY = e.clientY;
                const startValue = inst[param];
                
                const updateValue = (ev) => {
                    const deltaY = startY - ev.clientY;
                    let newValue = startValue + deltaY * 0.005;
                    newValue = Math.max(0, Math.min(1, newValue));
                    inst[param] = newValue;
                    this.ui.renderSoundEditor();
                };
                
                const stopDrag = () => {
                    document.removeEventListener('mousemove', updateValue);
                    document.removeEventListener('mouseup', stopDrag);
                };
                
                document.addEventListener('mousemove', updateValue);
                document.addEventListener('mouseup', stopDrag);
            }

            setTrackInstrument(trackId, instId) {
                // 更新该轨道的默认乐器
            }

            toggleMute(trackId) {
                this.ui.tracks[trackId].mute = !this.ui.tracks[trackId].mute;
                this.ui.initMixer();
            }

            toggleSolo(trackId) {
                if (this.ui.tracks[trackId].solo) {
                    this.ui.tracks[trackId].solo = false;
                } else {
                    for (const id in this.ui.tracks) {
                        this.ui.tracks[id].solo = false;
                    }
                    this.ui.tracks[trackId].solo = true;
                }
                this.ui.initMixer();
            }

            setTrackVolume(trackId, volume) {
                this.ui.tracks[trackId].volume = parseFloat(volume);
                this.ui.initMixer();
            }

            startPanDrag(e, trackId) {
                e.preventDefault();
                const knob = e.target.closest('.pan-knob');
                const rect = knob.getBoundingClientRect();
                
                const updatePan = (ev) => {
                    const x = ev.clientX - rect.left;
                    const centerX = rect.width / 2;
                    const pan = Math.max(-1, Math.min(1, (x - centerX) / centerX));
                    this.ui.tracks[trackId].pan = pan;
                    knob.style.transform = `rotate(${pan * 45}deg)`;
                };

                const stopDrag = () => {
                    document.removeEventListener('mousemove', updatePan);
                    document.removeEventListener('mouseup', stopDrag);
                };

                document.addEventListener('mousemove', updatePan);
                document.addEventListener('mouseup', stopDrag);
                updatePan(e);
            }

            zoomIn() { this.ui.zoomIn(); }
            zoomOut() { this.ui.zoomOut(); }

            newProject() {
                this.ui.tracks = {};
                this.ui.notes = [];
                this.audioEngine.instruments = {};
                this.audioEngine.instrumentCounter = 0;
                this.audioEngine.initDefaultInstruments();
                this.ui.initTracks();
                this.ui.initMixer();
                this.ui.initSequencerUI();
                this.ui.drawPianoRoll();
                this.stop();
            }

            saveProject() {
                const project = {
                    tracks: this.ui.tracks,
                    notes: this.ui.notes,
                    instruments: this.audioEngine.instruments,
                    instrumentCounter: this.audioEngine.instrumentCounter,
                    bpm: this.sequencer.bpm,
                    loop: this.sequencer.loop,
                    snap: this.ui.snap,
                    zoom: this.ui.zoom
                };
                localStorage.setItem('flStudioProjectV3', JSON.stringify(project));
                alert('项目已保存');
            }

            loadProject() {
                const saved = localStorage.getItem('flStudioProjectV3');
                if (!saved) {
                    alert('没有找到保存的项目');
                    return;
                }
                const project = JSON.parse(saved);
                this.ui.tracks = project.tracks;
                this.ui.notes = project.notes;
                this.audioEngine.instruments = project.instruments;
                this.audioEngine.instrumentCounter = project.instrumentCounter;
                this.sequencer.setBPM(project.bpm);
                this.sequencer.setLoop(project.loop);
                this.ui.setSnap(project.snap);
                this.ui.zoom = project.zoom;
                
                this.setBPM(project.bpm);
                document.getElementById('loopToggle').checked = project.loop;
                
                this.ui.initMixer();
                this.ui.initSequencerUI();
                this.ui.drawPianoRoll();
                this.stop();
                alert('项目已加载');
            }

            async exportAudio() {
                this.stop();
                this.audioEngine.init();
                
                const offlineCtx = new OfflineAudioContext(2, 44100 * 8, 44100);
                const masterGain = offlineCtx.createGain();
                masterGain.gain.value = 0.8;
                masterGain.connect(offlineCtx.destination);

                const stepDuration = 60 / (this.sequencer.bpm * 4);

                for (const note of this.ui.notes) {
                    const track = this.ui.tracks[note.trackId];
                    if (!track || track.mute) continue;

                    const freq = 440 * Math.pow(2, (note.pitch - 69) / 12);
                    const startTime = note.startStep * stepDuration;
                    const duration = note.durationSteps * stepDuration;
                    const inst = this.audioEngine.getInstrument(note.instrumentId);
                    
                    if (inst) {
                        this.playNoteOffline(offlineCtx, freq, startTime, duration, track, inst, masterGain);
                    }
                }

                const renderedBuffer = await offlineCtx.startRendering();
                this.downloadWAV(renderedBuffer);
            }

            playNoteOffline(ctx, freq, startTime, duration, track, inst, masterGain) {
                const osc = ctx.createOscillator();
                const envelope = ctx.createGain();
                const filter = ctx.createBiquadFilter();
                const panNode = ctx.createStereoPanner();

                osc.type = inst.waveform || 'sine';
                osc.frequency.value = freq;

                envelope.gain.setValueAtTime(0, startTime);
                envelope.gain.linearRampToValueAtTime(track.volume * 0.5, startTime + inst.attack);
                envelope.gain.linearRampToValueAtTime(track.volume * 0.5 * inst.sustain, startTime + inst.attack + inst.decay);
                envelope.gain.setValueAtTime(track.volume * 0.5 * inst.sustain, startTime + duration - inst.release);
                envelope.gain.linearRampToValueAtTime(0, startTime + duration);

                filter.type = inst.filterType;
                filter.frequency.value = inst.filterFreq;
                filter.Q.value = inst.filterQ;

                panNode.pan.value = track.pan;

                osc.connect(envelope);
                envelope.connect(filter);
                filter.connect(panNode);
                panNode.connect(masterGain);

                osc.start(startTime);
                osc.stop(startTime + duration + 0.1);
            }

            downloadWAV(buffer) {
                const sampleRate = buffer.sampleRate;
                const channels = buffer.numberOfChannels;
                const length = buffer.length * channels;
                const wav = new ArrayBuffer(44 + length * 2);
                const view = new DataView(wav);

                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) {
                        view.setUint8(offset + i, string.charCodeAt(i));
                    }
                };

                writeString(0, 'RIFF');
                view.setUint32(4, 36 + length * 2, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, channels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * 2 * channels, true);
                view.setUint16(32, channels * 2, true);
                view.setUint16(34, 16, true);
                writeString(36, 'data');
                view.setUint32(40, length * 2, true);

                let offset = 44;
                for (let i = 0; i < buffer.length; i++) {
                    for (let c = 0; c < channels; c++) {
                        const sample = Math.max(-1, Math.min(1, buffer.getChannelData(c)[i]));
                        view.setInt16(offset, sample * 32767, true);
                        offset += 2;
                    }
                }

                const blob = new Blob([wav], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `fl-studio-v3-${Date.now()}.wav`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            toggleMixer() {
                const mixer = document.querySelector('.mixer-panel');
                mixer.style.width = mixer.style.width === '0px' ? '350px' : '0px';
            }
        }

        const app = new App();

        // ========== Electron 桌面应用集成 ==========
        // 检测是否在 Electron 环境中运行
        const isElectron = typeof window !== 'undefined' && typeof window.electronAPI !== 'undefined';

        if (isElectron) {
            // 当前项目文件路径
            let currentFilePath = null;

            // 监听菜单操作
            window.electronAPI.onMenuAction((action) => {
                switch (action) {
                    case 'newProject':
                        app.newProject();
                        currentFilePath = null;
                        break;
                    case 'saveProject':
                        if (currentFilePath) {
                            saveToFilePath(currentFilePath);
                        } else {
                            saveProjectAsDesktop();
                        }
                        break;
                    case 'exportAudio':
                        app.exportAudio();
                        break;
                    case 'zoomIn':
                        app.zoomIn();
                        break;
                    case 'zoomOut':
                        app.zoomOut();
                        break;
                    case 'switchPiano':
                        app.ui.switchView('piano');
                        break;
                    case 'switchStep':
                        app.ui.switchView('step');
                        break;
                    case 'togglePlay':
                        if (app.sequencer.isPlaying) {
                            app.stop();
                        } else {
                            app.play();
                        }
                        break;
                    case 'stop':
                        app.stop();
                        break;
                    case 'bpmUp':
                        const newBpmUp = Math.min(200, app.sequencer.bpm + 5);
                        app.setBPM(newBpmUp);
                        break;
                    case 'bpmDown':
                        const newBpmDown = Math.max(60, app.sequencer.bpm - 5);
                        app.setBPM(newBpmDown);
                        break;
                }
            });

            // 监听项目加载
            window.electronAPI.onLoadProject((project, filePath) => {
                loadProjectFromData(project, filePath);
            });

            // 监听保存请求
            window.electronAPI.onGetProjectData((filePath) => {
                saveToFilePath(filePath);
            });

            // 加载项目数据
            function loadProjectFromData(project, filePath) {
                app.ui.tracks = project.tracks;
                app.ui.notes = project.notes;
                app.audioEngine.instruments = project.instruments;
                app.audioEngine.instrumentCounter = project.instrumentCounter;
                app.sequencer.setBPM(project.bpm);
                app.sequencer.setLoop(project.loop);
                app.ui.setSnap(project.snap);
                app.ui.zoom = project.zoom;
                
                app.setBPM(project.bpm);
                document.getElementById('loopToggle').checked = project.loop;
                
                app.ui.initMixer();
                app.ui.initSequencerUI();
                app.ui.drawPianoRoll();
                app.stop();
                
                currentFilePath = filePath;
                document.title = `FL Studio Editor - ${filePath.split('/').pop()}`;
            }

            // 另存为
            async function saveProjectAsDesktop() {
                const result = await window.electronAPI.showSaveDialog({
                    title: '保存项目',
                    filters: [
                        { name: '音乐项目', extensions: ['flproj'] },
                        { name: 'JSON 文件', extensions: ['json'] }
                    ],
                    defaultPath: '未命名项目.flproj'
                });

                if (!result.canceled && result.filePath) {
                    await saveToFilePath(result.filePath);
                }
            }

            // 保存到指定路径
            async function saveToFilePath(filePath) {
                const project = {
                    tracks: app.ui.tracks,
                    notes: app.ui.notes,
                    instruments: app.audioEngine.instruments,
                    instrumentCounter: app.audioEngine.instrumentCounter,
                    bpm: app.sequencer.bpm,
                    loop: app.sequencer.loop,
                    snap: app.ui.snap,
                    zoom: app.ui.zoom
                };

                const result = await window.electronAPI.saveProjectFile(filePath, project);
                if (result.success) {
                    currentFilePath = filePath;
                    document.title = `FL Studio Editor - ${filePath.split('/').pop()}`;
                    alert('项目已保存');
                } else {
                    alert('保存失败：' + result.error);
                }
            }

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                // 空格键播放/暂停
                if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    if (app.sequencer.isPlaying) {
                        app.stop();
                    } else {
                        app.play();
                    }
                }
                // Escape 停止
                if (e.code === 'Escape') {
                    app.stop();
                }
            });
        } else {
            // 浏览器环境的键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                    e.preventDefault();
                    if (app.sequencer.isPlaying) {
                        app.stop();
                    } else {
                        app.play();
                    }
                }
                if (e.code === 'Escape') {
                    app.stop();
                }
            });
        }
    </script>
